<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #223042;
      }
      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 640px;
        background: white;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Welcome</h1>
        <p>This is a simple and clean web page built with Flask.</p>
        <p>It is easy to read, easy to use, and ready for your next project.</p>
      </section>
    </main>
  </body>
</html>
